name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [created, published]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/hotel-backend
  FRONTEND_IMAGE: ${{ github.repository }}/hotel-frontend

jobs:
  # ==============================================================
  # VALIDATION STAGE
  # ==============================================================

  validate-dependencies:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

  lint:
    name: Lint Code (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

  # ==============================================================
  # BUILD STAGE
  # ==============================================================

  build-frontend:
    name: Build Frontend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Check build output
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Frontend build successful"
          ls -la frontend/dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 5

  build-backend:
    name: Build Backend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Validate backend syntax
        run: node -c index.js
        working-directory: backend

      - name: Verify backend starts
        run: |
          timeout 3 node index.js &
          sleep 2
          echo "✅ Backend startup verified"
        working-directory: backend
        continue-on-error: true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend
          retention-days: 5

  # ==============================================================
  # DOCKER BUILD & PUSH STAGE
  # ==============================================================

  build-docker-images:
    name: Build Docker Images
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'release' || github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose setup
        run: |
          docker compose config > /dev/null && echo "✅ Docker Compose configuration valid" || exit 1

  # ==============================================================
  # SECURITY STAGE
  # ==============================================================

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ==============================================================
  # FINAL CHECKS & PUBLISH STAGE
  # ==============================================================

  publish-release:
    name: Publish Release Packages
    needs: [build-frontend, build-backend, build-docker-images, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'release' && (github.event.action == 'created' || github.event.action == 'published')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com/

      - name: Install dependencies
        run: npm ci

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==============================================================
  # STATUS CHECK
  # ==============================================================

  pipeline-status:
    name: Pipeline Status
    needs: [validate-dependencies, lint, build-frontend, build-backend, build-docker-images, security-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.validate-dependencies.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.build-frontend.result }}" == "failure" ] || \
             [ "${{ needs.build-backend.result }}" == "failure" ] || \
             [ "${{ needs.build-docker-images.result }}" == "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          fi
          echo "✅ Pipeline completed successfully"
