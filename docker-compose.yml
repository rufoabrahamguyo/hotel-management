services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel}
      POSTGRES_DB: ${POSTGRES_DB:-hotel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # Adds status / manager_staff_id (+ Admin→SystemAdmin); idempotent. For existing volumes: npm run docker:migrate-db
      - ./backend/db/migrate_legacy_roles.sql:/docker-entrypoint-initdb.d/02-migrate_legacy_roles.sql:ro
      - ./backend/db/migrate_pms_tables.sql:/docker-entrypoint-initdb.d/03-migrate_pms_tables.sql:ro
      # Adds organization/property/staff_property + backfills existing data; idempotent. For existing volumes: npm run docker:migrate-multitenant
      - ./backend/db/migrate_multitenant.sql:/docker-entrypoint-initdb.d/04-migrate_multitenant.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    # Defaults match POSTGRES_* below; if you change user/db, update this line too.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hotel -d hotel']
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hotel}:${POSTGRES_PASSWORD:-hotel}@postgres:5432/${POSTGRES_DB:-hotel}
      # Required: set JWT_SECRET in a root `.env` (see docker.env.example). Compose fails if unset.
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — see docker.env.example}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      ALLOW_PUBLIC_REGISTER: ${ALLOW_PUBLIC_REGISTER:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in .env — see docker.env.example}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Administrator}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
